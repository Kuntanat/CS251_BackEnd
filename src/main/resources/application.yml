server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: CS251_BackEnd

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cs251_db}?useSSL=false&serverTimezone=Asia/Bangkok&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      connection-timeout: 30000

  # ไม่ใช้ JPA/Hibernate — ใช้ JdbcTemplate แทน
  sql:
    init:
      mode: never   # schema จัดการด้วย db/init/*.sql ใน Docker

jwt:
  secret: ${JWT_SECRET:MySuperSecretKeyForJWTThatIsAtLeast32CharactersLong}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.cs251.backend: ${LOG_LEVEL:DEBUG}
    org.springframework.security: ${LOG_LEVEL_SECURITY:DEBUG}
    org.springframework.jdbc: ${LOG_LEVEL:INFO}
